<div class="auth-container">
  
  <!-- Left Side: Brand Visuals -->
  <div class="auth-banner-side">
    <div class="banner-card">
      <img src="/logo.png" alt="Taskly Logo" class="banner-logo" />
      <p class="banner-tagline">
        Streamline collaborative pipelines, track milestones in real-time, and manage deadlines elegantly.
      </p>
    </div>
  </div>

  <!-- Right Side: Action Forms -->
  <div class="auth-form-side">
    <div class="auth-card">
      <div class="auth-header">
        <h2 style="font-size: 2rem; font-weight: 800; color: var(--color-primary); margin-bottom: 8px;">Welcome Back</h2>
        <p class="subtitle">Securely log in to manage your workspaces</p>
      </div>

      <form (ngSubmit)="onSubmit()">
        @if (errorMessage()) {
          <div class="error-banner">
            {{ errorMessage() }}
          </div>
        }

        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="email"
            placeholder="e.g. fabrice@example.com"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-input-container">
            <input
              [type]="showPassword() ? 'text' : 'password'"
              id="password"
              name="password"
              [(ngModel)]="password"
              placeholder="••••••••"
              required
            />
            <button 
              type="button" 
              class="btn-toggle-password" 
              (click)="showPassword.set(!showPassword())"
              [title]="showPassword() ? 'Hide Password' : 'Show Password'"
            >
              @if (showPassword()) {
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"/>
                </svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              }
            </button>
          </div>
        </div>

        <button type="submit" class="btn-primary auth-submit-btn" [disabled]="isLoading()">
          @if (isLoading()) {
            Logging in...
          } @else {
            Log In
          }
        </button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a routerLink="/register" class="auth-link">Sign Up</a></p>
      </div>
    </div>
  </div>

</div>
